<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="logGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="64" ry="64" fill="url(#bgGrad)"/>

  <!-- Magnifying glass circle -->
  <circle cx="220" cy="220" r="100" fill="none" stroke="url(#logGrad)" stroke-width="24" stroke-linecap="round"/>

  <!-- Magnifying glass handle -->
  <line x1="295" y1="295" x2="380" y2="380" stroke="url(#logGrad)" stroke-width="28" stroke-linecap="round"/>

  <!-- Log lines inside magnifying glass -->
  <g fill="none" stroke="#a5b4fc" stroke-width="12" stroke-linecap="round">
    <line x1="160" y1="185" x2="280" y2="185"/>
    <line x1="160" y1="220" x2="260" y2="220"/>
    <line x1="160" y1="255" x2="240" y2="255"/>
  </g>

  <!-- Accent dot for "informant" feel -->
  <circle cx="400" cy="112" r="24" fill="#22c55e"/>

  <!-- Small notification indicator -->
  <circle cx="400" cy="112" r="12" fill="#86efac"/>
</svg>
